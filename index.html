<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Paint the themed background immediately, before the CSS bundle loads, so
         this dark-themed app never flashes white on a cold load. Tailwind's
         Preflight (which resets the body margin) ships in the bundle, so we also
         zero the margin here to avoid a white frame in the meantime. -->
    <style>
      html,
      body {
        margin: 0;
        background: #222831;
        color: #fff;
      }
    </style>

    <!-- Self-hosted Poppins (see src/assets/styles/fonts.css). Preload the body
         weight so it downloads in parallel with the JS bundle instead of waiting
         on a cross-origin stylesheet round-trip. crossorigin is required even
         though the file is same-origin: fonts are fetched in CORS mode, so
         without it the browser would download this file twice. -->
    <link
      rel="preload"
      href="/fonts/poppins-400-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <title>Movie Club</title>

    <!-- Default Open Graph Meta Tags (overridden by edge function for shared reviews) -->
    <meta
      property="og:title"
      content="Movie Club - Review movies with your friends"
    />
    <meta
      property="og:description"
      content="Join clubs and review movies with your friends. Track ratings, manage watchlists, and discover great films together."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Movie Club" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body class="bg-background text-text">
    <noscript>
      <strong
        >We're sorry but Movie Club doesn't work properly without JavaScript
        enabled. Please enable it to continue.</strong
      >
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
